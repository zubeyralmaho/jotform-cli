version: 2

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/zubeyralmaho/jotform-cli/cmd.Version={{.Version}}
      - -X github.com/zubeyralmaho/jotform-cli/cmd.Commit={{.Commit}}
      - -X github.com/zubeyralmaho/jotform-cli/cmd.BuildDate={{.Date}}

archives:
  - format: tar.gz
    name_template: "jotform_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

brews:
  - name: jotform
    repository:
      owner: jotform
      name: homebrew-tap
    description: "AI-native Jotform CLI for developers and AI agents"
    homepage: "https://github.com/zubeyralmaho/jotform-cli"
    install: |
      bin.install "jotform"
      bin.install_symlink bin/"jotform" => "jf"
    test: |
      system "#{bin}/jotform", "version"
      system "#{bin}/jf", "version"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - Merge pull request
