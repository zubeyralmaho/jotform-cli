version: 2

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/zubeyralmaho/jotform-cli/cmd.Version={{.Version}}
      - -X github.com/zubeyralmaho/jotform-cli/cmd.Commit={{.Commit}}
      - -X github.com/zubeyralmaho/jotform-cli/cmd.BuildDate={{.Date}}

archives:
  - format: tar.gz
    name_template: "jotform_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

# NOTE: Homebrew publishing is temporarily disabled for stable GitHub Releases.
# Re-enable after tap repository ownership/token are configured.

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - Merge pull request
